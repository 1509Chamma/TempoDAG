name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "chore/**"
      - "fix/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect-native:
    name: Detect Native Sources
    runs-on: ubuntu-latest
    outputs:
      has_native: ${{ steps.detect.outputs.has_native }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Detect C and C++ files
        id: detect
        shell: bash
        run: |
          if git ls-files '*.c' '*.cc' '*.cpp' '*.cxx' '*.h' '*.hh' '*.hpp' '*.hxx' | grep -q .; then
            echo "has_native=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_native=false" >> "$GITHUB_OUTPUT"
          fi

  format:
    name: Format Checks
    runs-on: ubuntu-latest
    needs: detect-native
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Check Python formatting
        run: python -m black --check .

      - name: Check Python import/lint formatting
        run: python -m ruff check .

      - name: Install clang-format
        if: needs.detect-native.outputs.has_native == 'true'
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check native formatting
        if: needs.detect-native.outputs.has_native == 'true'
        shell: bash
        run: |
          git ls-files '*.c' '*.cc' '*.cpp' '*.cxx' '*.h' '*.hh' '*.hpp' '*.hxx' \
            | xargs -r clang-format --dry-run --Werror

  python-quality:
    name: Python Quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run pyrefly
        run: pyrefly check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake ninja-build

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build CMake target
        run: cmake --build build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t tempo-dag-ci .

  native-quality:
    name: Native Quality
    runs-on: ubuntu-latest
    needs:
      - detect-native
      - build
    if: needs.detect-native.outputs.has_native == 'true'
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Install native analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build cppcheck clang-tidy

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run cppcheck
        shell: bash
        run: |
          cppcheck --enable=all --error-exitcode=1 --inline-suppr --quiet \
            -I include -I src \
            $(git ls-files '*.c' '*.cc' '*.cpp' '*.cxx' '*.h' '*.hh' '*.hpp' '*.hxx')

      - name: Run clang-tidy
        shell: bash
        run: |
          clang-tidy -p build $(git ls-files '*.c' '*.cc' '*.cpp' '*.cxx' '*.h' '*.hh' '*.hpp' '*.hxx')

  test:
    name: Test
    runs-on: ubuntu-latest
    needs:
      - format
      - python-quality
      - build
      - docker-build
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run test suite
        run: PYTHONPATH=src python -m pytest -q
